<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
  <!-- Phosphor-style icon sprite, 24x24 viewBox, stroke-based to match .icon class -->

  <symbol id="i-calendar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="5" width="18" height="16" rx="2"/>
    <line x1="3" y1="10" x2="21" y2="10"/>
    <line x1="8" y1="3" x2="8" y2="7"/>
    <line x1="16" y1="3" x2="16" y2="7"/>
  </symbol>

  <symbol id="i-trophy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M7 4h10v6a5 5 0 0 1-10 0V4z"/>
    <path d="M7 6H4v1a3 3 0 0 0 3 3"/>
    <path d="M17 6h3v1a3 3 0 0 1-3 3"/>
    <line x1="12" y1="15" x2="12" y2="19"/>
    <line x1="8" y1="20" x2="16" y2="20"/>
  </symbol>

  <symbol id="i-pin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 21s7-7 7-12a7 7 0 0 0-14 0c0 5 7 12 7 12z"/>
