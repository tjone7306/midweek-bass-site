    <path d="M17 6H10a3 3 0 0 0 0 6h4a3 3 0 0 1 0 6H7"/>
  </symbol>

  <symbol id="i-scale" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="12" y1="4" x2="12" y2="21"/>
    <line x1="7" y1="21" x2="17" y2="21"/>
    <line x1="4" y1="7" x2="20" y2="7"/>
    <line x1="6" y1="7" x2="12" y2="4"/>
    <line x1="18" y1="7" x2="12" y2="4"/>
    <path d="M2 14a4 4 0 0 0 8 0L6 7z"/>
    <path d="M14 14a4 4 0 0 0 8 0L18 7z"/>
